<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="../../fish_logo.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Nori-Wynn - Online Players" />
    <meta property="og:description" content="Players in Online Worlds" />
    <meta property="og:url" content="https://nori.fish/wynn/online" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://nori.fish/resources/nori_logo.png" />
    <title>Nori-Wynn Online Players</title>
    <link rel="stylesheet" href="../../css_global/default.css?v=1">
    <link rel="stylesheet" href="../../css_global/sidebar.css?v=1">
    <link rel="stylesheet" href="../../css_global/dark_theme.css?v=1" id="dark-theme-css" disabled>
    <link rel="stylesheet" href="styles.css?v=1">
    <script src="../../js_global/online_servers.js?v=1" defer></script>
    <script type="text/javascript" src="../../js_global/sidebar.js?v=1"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8D8GME84PS"></script>
    <script src="../../js_global/analytics.js?v=1"></script>
    <!-- Temporarily disabled Google Ads -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6817592042954484"
    data-overlays="bottom" crossorigin="anonymous"></script> -->
    <script src="../../js_global/config.js?v=1"></script>
    <script src="../../js_global/layout.js?v=1"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="brand">
                <img src="https://nori.fish/resources/nori_logo.png" alt="Nori Logo">
                <div>
                    <h1>Nori-Wynn</h1>
                    <div class="subtitle">Online Players</div>
                </div>
            </div>
            <nav aria-label="Main navigation">
                <!-- Navigation links will be inserted by layout.js -->
            </nav>
        </div>
    </header>
    <div id="menu-button" onclick="toggleSidebar()">☰</div>
    <div id="sidebar"></div>

    <main class="container online-container">
        <section class="online-hero">
            <div>
                <p class="eyebrow">Live Wynncraft worlds</p>
                <h2>Online Players</h2>
                <p class="hero-copy">Browse active worlds, expand player lists, or check one player directly.</p>
            </div>
            <form id="online-player-form" class="online-lookup-form">
                <label for="online-player-name">Check player</label>
                <div class="search-bar">
                    <input type="text" id="online-player-name" name="online-player-name" placeholder="Enter player name">
                    <button type="submit" class="search-button">Check</button>
                </div>
            </form>
        </section>

        <section id="online-player-result" class="lookup-result" aria-live="polite"></section>

        <section class="online-controls" aria-label="Online player controls">
            <div id="online-summary" class="online-summary"></div>
            <div class="button-container">
                <button id="uptimeButton" type="button" onclick="window.location.href='https://nori.fish/wynn/uptime'">Server Uptime</button>
                <button id="toggleAllButton" type="button" onclick="toggleAllServers()">Expand All</button>
            </div>
        </section>

        <section>
            <div id="playersList" class="players-list">
            </div>
            <div id="online-status-message" class="status-message" aria-live="polite"></div>
        </section>
    </main>

    <footer>
        <h3>&copy; 2024-2026 Nori, All rights reserved. Contact: dev@nori.fish</h3>
    </footer>
</body>
</html>
