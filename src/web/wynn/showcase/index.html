<!DOCTYPE html>
<html lang="en" class="showcase-page-html">
<head>
    <link rel="icon" href="../../fish_logo.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Nori-Build Showcase" />
    <meta property="og:description" content="Nori-Web Build Showcase" />
    <meta property="og:url" content="https://nori.fish/build/showcase" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://nori.fish/resources/nori_logo.png" />
    <title>Nori-Wynn Build Showcase</title>
    <link rel="stylesheet" href="../../css_global/sidebar.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../../css_global/default.css">
    <link rel="stylesheet" href="../../css_global/dark_theme.css" id="dark-theme-css" disabled>
    <script type="text/javascript" src="../../js_global/sidebar.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8D8GME84PS"></script>
    <script src="../../js_global/analytics.js"></script>
    <script src="../../js_global/load_showcase.js"></script>
    <script src="../../js_global/config.js"></script>
    <script src="../../js_global/layout.js"></script>
</head>
<body class="showcase-page">
    <header>
        <div style="display: flex; align-items: center; justify-content: center;">
            <img src="https://nori.fish/resources/nori_logo.png" alt="Nori Logo" style="width: 50px; height: auto; margin-right: 10px;">
            <h1>Nori-Wynn</h1>
        </div>
        <nav>
            <!-- Navigation links will be inserted by layout.js -->
        </nav>
    </header>

    <div id="menu-button" onclick="toggleSidebar()">☰</div>
    <div id="sidebar"></div>

    <div class="showcase-layout">
        <div class="player-section">
            <div class="video-wrapper">
                <iframe id="main-player" src="" frameborder="0" allowfullscreen
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                </iframe>
            </div>
            <div class="now-playing">
                <a id="now-playing-link" href="#" target="_blank" class="now-playing-title">Loading...</a>
            </div>
        </div>
        <div class="playlist-section">
            <div class="playlist-header">
                <span class="playlist-label">Showcase</span>
                <span id="playlist-count" class="playlist-count"></span>
            </div>
            <div id="playlist" class="playlist">
                <!-- playlist items injected by JS -->
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024-2026 Nori, All rights reserved. Web URL: nori.fish</p>
    </footer>
</body>
</html>
