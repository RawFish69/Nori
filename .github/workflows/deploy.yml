name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # SSH-based deploy — works on any remote server (VPS, cloud VM, bare metal)
  # Set secrets: SSH_HOST, SSH_USER, SSH_KEY, DEPLOY_PATH, RESTART_CMD
  # INSTALL_CMD is optional — defaults to pip install if not set
  # RESTART_CMD examples: "sudo systemctl restart nori" | "pm2 restart nori" | "bash ~/restart.sh"
  deploy-server:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            ${{ secrets.INSTALL_CMD || 'pip install -r src/bot/requirements.txt --quiet' }}
            ${{ secrets.RESTART_CMD }}

  # Docker-based deploy — builds and pushes a versioned image to Docker Hub
  # Set secrets: DOCKER_USERNAME, DOCKER_PASSWORD, DOCKER_IMAGE
  # Requires a Dockerfile at the repo root
  deploy-docker:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_IMAGE }}:latest
            ${{ secrets.DOCKER_IMAGE }}:${{ github.ref_name }}
